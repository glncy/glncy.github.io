# Sveltia CMS configuration.
# Backend: GitLab with PKCE auth -> no server / OAuth worker required.
backend:
  name: gitlab
  repo: glncy/glncy
  branch: main
  auth_type: pkce
  app_id: 9b093f6070f6c28feb3dc52bd930d3eeb85318d9d60f39e654f40ff3248a8d18

# Images committed straight to the repo; videos use YouTube (see Projects.youtube).
media_folder: public/img
public_folder: /img

collections:
  # ---- Singletons (file collections) ----
  - name: settings
    label: Site Settings
    files:
      - name: settings
        label: Settings
        file: src/data/settings.json
        fields:
          - { name: siteTitle, label: Site Title, widget: string }
          - { name: siteDescription, label: Site Description (SEO), widget: text }
          - { name: analyticsId, label: Google Analytics ID, widget: string, required: false }
          - { name: github, label: GitHub URL, widget: string }
          - name: pages
            label: Page Subtitles
            widget: object
            fields:
              - { name: aboutSubtitle, label: About subtitle, widget: string }
              - { name: projectsSubtitle, label: Projects subtitle, widget: string }
              - { name: contactSubtitle, label: Contact subtitle, widget: string }
          - name: contact
            label: Contact
            widget: object
            fields:
              - { name: email, label: Email, widget: string }
              - { name: linkedin, label: LinkedIn URL, widget: string }
              - { name: messenger, label: Messenger URL, widget: string }
          - name: backgroundVideos
            label: Background Lofi Videos
            widget: list
            fields:
              - { name: id, label: YouTube ID, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: channel, label: Channel, widget: string }

  - name: profile
    label: Profile
    files:
      - name: profile
        label: Profile
        file: src/data/profile.json
        fields:
          - { name: name, label: Name, widget: string }
          - { name: role, label: Role, widget: string }
          - { name: tagline, label: Tagline, widget: string }
          - { name: location, label: Location, widget: string }
          - { name: image, label: Profile Image, widget: image }
          - { name: bio, label: Bio, widget: text }

  - name: skills
    label: Skills
    files:
      - name: skills
        label: Skills
        file: src/data/skills.json
        fields:
          - name: categories
            label: Categories
            widget: list
            fields:
              - { name: category, label: Category, widget: string }
              - name: list
                label: Items
                widget: list
                fields:
                  - { name: name, label: Name, widget: string }
                  - { name: icon, label: Devicon class, widget: string, required: false }
                  - { name: img, label: Custom image, widget: image, required: false }

  # ---- Folder collections ----
  - name: jobs
    label: Job History
    folder: src/content/jobs
    format: frontmatter
    create: true
    slug: '{{order}}-{{company}}-{{title}}'
    fields:
      - { name: title, label: Title, widget: string }
      - { name: company, label: Company, widget: string }
      - { name: location, label: Location, widget: string }
      - { name: startDate, label: Start Date, widget: string }
      - { name: endDate, label: End Date, widget: string }
      - { name: order, label: Order (higher = shown first), widget: number, value_type: int }
      - { name: body, label: Description, widget: markdown }

  - name: projects
    label: Projects
    folder: src/content/projects
    format: frontmatter
    create: true
    slug: '{{order}}-{{name}}'
    fields:
      - { name: name, label: Name, widget: string }
      - { name: year, label: Year, widget: string }
      - { name: order, label: Order (higher = shown first), widget: number, value_type: int }
      - { name: stack, label: Stack, widget: list, field: { name: item, label: Tech, widget: string } }
      - { name: contributions, label: Contributions, widget: list, field: { name: item, label: Contribution, widget: string } }
      - { name: thumbnail, label: Thumbnail (optional), widget: image, required: false }
      - { name: youtube, label: YouTube URL (optional), widget: string, required: false }
      - { name: body, label: Remarks, widget: markdown, required: false }
