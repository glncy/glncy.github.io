# Sveltia CMS configuration.
# Backend: GitLab with PKCE auth -> no server / OAuth worker required.
backend:
  name: gitlab
  repo: glncy/glncy
  branch: main
  auth_type: pkce
  app_id: 9b093f6070f6c28feb3dc52bd930d3eeb85318d9d60f39e654f40ff3248a8d18

# Images committed straight to the repo; videos use YouTube (see Projects.youtube).
media_folder: public/img
public_folder: /img

collections:
  # ---- Singletons (file collections) ----
  - name: settings
    label: Site Settings
    files:
      - name: settings
        label: Settings
        file: src/data/settings.json
        fields:
          - { name: siteTitle, label: Site Title, widget: string }
          - { name: siteDescription, label: Site Description (SEO), widget: text }
          - { name: analyticsId, label: Google Analytics ID, widget: string, required: false }
          - { name: web3formsKey, label: Web3Forms Access Key (contact form), widget: string, required: false }
          - { name: location, label: Location / Timezone, widget: string, required: false }
          - { name: responseTime, label: Response time note, widget: string, required: false }
          - { name: services, label: Services (contact intro line), widget: text, required: false }
          - name: pages
            label: Page Subtitles
            widget: object
            fields:
              - { name: aboutSubtitle, label: About subtitle, widget: string }
              - { name: servicesSubtitle, label: Services subtitle, widget: string }
              - { name: projectsSubtitle, label: Projects subtitle, widget: string }
              - { name: postsSubtitle, label: Posts subtitle, widget: string }
              - { name: blogSubtitle, label: Blog subtitle, widget: string }
              - { name: tilSubtitle, label: TIL subtitle, widget: string }
              - { name: contactSubtitle, label: Contact subtitle, widget: string }
          - name: contact
            label: Contact
            widget: object
            fields:
              - { name: email, label: Email, widget: string }
          - name: socials
            label: Social / Contact Links
            widget: list
            summary: '{{fields.label}}'
            fields:
              - { name: label, label: Label, widget: string }
              - { name: url, label: URL, widget: string }
              - { name: icon, label: Icon (ph:name from phosphoricons.com), widget: string }
          - name: handles
            label: Handles (shown on Projects)
            widget: list
            summary: '{{fields.handle}}'
            fields:
              - { name: icon, label: Icon (ph:name from phosphoricons.com), widget: string }
              - { name: handle, label: Handle (e.g. @glncy), widget: string }
              - { name: url, label: URL, widget: string }

  - name: services
    label: Services
    files:
      - name: services
        label: Services
        file: src/data/services.json
        fields:
          - { name: intro, label: Intro, widget: text }
          - name: items
            label: Offerings
            widget: list
            fields:
              - { name: icon, label: Icon (ph:name), widget: string }
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
          - name: process
            label: Process steps
            widget: list
            fields:
              - { name: step, label: Step (e.g. 01), widget: string }
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }

  - name: testimonials
    label: Testimonials
    files:
      - name: testimonials
        label: Testimonials
        file: src/data/testimonials.json
        fields:
          - name: items
            label: Testimonials
            widget: list
            fields:
              - { name: quote, label: Quote, widget: text }
              - { name: name, label: Name, widget: string }
              - { name: role, label: Role, widget: string, required: false }
              - { name: company, label: Company, widget: string, required: false }
              - { name: avatar, label: Avatar, widget: image, required: false }

  - name: background
    label: Background Videos
    files:
      - name: background
        label: Background Videos
        file: src/data/background.json
        fields:
          - { name: prompt, label: Music player prompt (shown before unmute), widget: string }
          - name: videos
            label: Videos
            widget: list
            fields:
              - { name: id, label: YouTube ID, widget: string }
              - { name: title, label: Title, widget: string }
              - { name: channel, label: Channel, widget: string }

  - name: profile
    label: Profile
    files:
      - name: profile
        label: Profile
        file: src/content/profile/profile.mdx
        fields:
          - { name: name, label: Name, widget: string }
          - { name: role, label: Role, widget: string }
          - { name: tagline, label: Tagline, widget: string }
          - { name: location, label: Location, widget: string }
          - { name: image, label: Profile Image, widget: image }
          - { name: body, label: Bio, widget: markdown }

  - name: skills
    label: Skills
    files:
      - name: skills
        label: Skills
        file: src/data/skills.json
        fields:
          - name: categories
            label: Categories
            widget: list
            fields:
              - { name: category, label: Category, widget: string }
              - name: list
                label: Items
                widget: list
                fields:
                  - { name: name, label: Name, widget: string }
                  - { name: icon, label: Devicon class, widget: string, required: false }
                  - { name: img, label: Custom image, widget: image, required: false }

  # ---- Folder collections ----
  - name: jobs
    label: Job History
    folder: src/content/jobs
    extension: mdx
    format: frontmatter
    create: true
    slug: '{{order}}-{{company}}-{{title}}'
    fields:
      - { name: title, label: Title, widget: string }
      - { name: company, label: Company, widget: string }
      - { name: location, label: Location, widget: string }
      - { name: startDate, label: Start Date, widget: string }
      - { name: endDate, label: End Date, widget: string }
      - { name: order, label: Order (higher = shown first), widget: number, value_type: int }
      - { name: body, label: Description, widget: markdown }

  - name: projects
    label: Projects
    folder: src/content/projects
    extension: mdx
    format: frontmatter
    create: true
    slug: '{{order}}-{{name}}'
    fields:
      - { name: name, label: Name, widget: string }
      - { name: year, label: Year, widget: string }
      - { name: order, label: Order (higher = shown first), widget: number, value_type: int }
      - { name: featured, label: Featured (show in the Featured section), widget: boolean, default: false, required: false }
      - { name: stack, label: Stack, widget: list, field: { name: item, label: Tech, widget: string } }
      - { name: contributions, label: Contributions, widget: list, field: { name: item, label: Contribution, widget: string } }
      - { name: thumbnail, label: Thumbnail (optional), widget: image, required: false }
      - { name: youtube, label: YouTube URL (optional), widget: string, required: false }
      - { name: body, label: Remarks, widget: markdown, required: false }

  - name: blog
    label: Blog
    folder: src/content/blog
    extension: mdx
    format: frontmatter
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date created, widget: datetime }
      - { name: updated, label: Date updated, widget: datetime, required: false }
      - { name: description, label: Description, widget: text, required: false }
      - { name: thumbnail, label: Thumbnail, widget: image, required: false }
      - { name: tags, label: Tags, widget: list, required: false, field: { name: tag, label: Tag, widget: string } }
      - { name: body, label: Body, widget: markdown }

  - name: til
    label: TIL
    folder: src/content/til
    extension: mdx
    format: frontmatter
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date created, widget: datetime }
      - { name: updated, label: Date updated, widget: datetime, required: false }
      - { name: description, label: Description, widget: text, required: false }
      - { name: thumbnail, label: Thumbnail, widget: image, required: false }
      - { name: tags, label: Tags, widget: list, required: false, field: { name: tag, label: Tag, widget: string } }
      - { name: body, label: Body, widget: markdown }
